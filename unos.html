    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <meta name="keywords" content="unos, vijesti, administracija">

</head>
<body>

    <header>
        <a href="index.html"><img src="img/Logo.png" alt=""></a>
        <h1>Pregled News</h1>
        <nav>
            <ul>
                <li><a href="index.html">Početna</a></li>
                <li><a href="index.html#politika">Politika</a></li>
                <li><a href="index.html#tehnologija">Tehnologija</a></li>
                <li><a href="index.html#sport">Sport</a></li>
                <li><a href="unos.html">Unos</a></li>
            </ul>
        </nav>
    </header>

    <main>
        
        <form class="formaUnosa" action="skripta.php" method="POST" name="NovaVijest" >

            <div class="stavkaForme">
                <label for="title">Naslov vijesti</label>
                <input type="text" name="title" id="title" class="poljeUnosa" autofocus>
            </div>

            <div class="stavkaForme">
                <label for="about">Kratki sadržaj vijesti (do 50 znakova)</label>
                <textarea name="about" id="about" cols="30" rows="3" class="poljeUnosa"></textarea>
            </div>

            <div class="stavkaForme">
                <label for="content">Sadržaj vijesti</label>
                <textarea name="content" id="content" cols="30" rows="10" class="poljeUnosa"></textarea>
            </div>

            <div class="stavkaForme">
                <label for="category">Kategorija vijesti</label>
                <select name="category" id="category" class="poljeUnosa">
                    <option value="politika">Politika</option>
                    <option value="tehnologija">Tehnologija</option>
                    <option value="sport">Sport</option>
                </select>
            </div>

            <div class="stavkaForme">
                <label for="pphoto">Slika</label>
                <input type="file" name="pphoto" id="pphoto" accept="image/png,image/jpeg,image/webp">
            </div>

            <div class="stavkaForme stavkaCheckbox">
                <label for="archive">
                    <input type="checkbox" name="archive" id="archive">
                    Spremiti u arhivu (ne prikazuje se na stranici)
                </label>
            </div>

            <div class="stavkaForme gumbiForme">
                <button type="reset">Poništi</button>
                <button type="submit">Prihvati</button>
            </div>

        </form>
    </main>

    <footer>
